name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run fixtures:check
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      # Deliberately no `--with-deps` / `install-deps`. The ubuntu-latest image already
      # ships every library Playwright asks for (apt reports each one "already the newest
      # version"); the only packages it ever adds are CJK/Thai/Cyrillic X fonts and
      # libasound2, which headless Chromium does not need for this Latin-only,
      # self-hosted-font UI. The step's entire cost is `apt-get update` against
      # azure.archive.ubuntu.com + packages.microsoft.com + dl.google.com: 12 s on a good
      # day, 4m57s on a bad one (run 30023387988 — 68% of that whole build). If a future
      # runner image drops a library, the browser tests fail loudly — re-add it here then.
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      - run: npm run test:browser
      - run: npm run build
      - run: npm run size
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
      # dist is not uploaded as a standalone artifact: nothing consumes it, and at 102 MB
      # (duckdb-wasm mvp+eh + vendored extensions) it cost 4m14s in run 30014623083. The
      # Pages artifact below ships the same bytes to the deploy job.
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - id: deployment
        uses: actions/deploy-pages@v5
